<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Rufai — Security Researcher Banner</title>
  <desc>Professional dark-themed banner for Rufai, security researcher</desc>
  <defs>
